<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>

  <!-- Tree (left) -->
  <ellipse cx="100" cy="200" rx="50" ry="60" fill="#43a047"/>
  <rect x="85" y="240" width="30" height="50" fill="#8d6e63"/>

  <!-- Leaf accent (top right of tree) -->
  <path d="M 140 150 Q 160 140 170 160" stroke="#66bb6a" stroke-width="3" fill="none"/>
  <circle cx="170" cy="160" r="4" fill="#66bb6a"/>

  <!-- Earth/Globe (center) -->
  <circle cx="200" cy="120" r="40" fill="#2196f3"/>
  <circle cx="200" cy="120" r="40" fill="none" stroke="#1565c0" stroke-width="2"/>

  <!-- Continents simplified -->
  <path d="M 210 100 L 230 110 L 220 125 Z" fill="#4caf50" opacity="0.8"/>
  <path d="M 185 125 L 195 120 L 200 135 Z" fill="#4caf50" opacity="0.8"/>

  <!-- Satellite -->
  <circle cx="250" cy="90" r="5" fill="#ffc107"/>
  <rect x="245" y="85" width="10" height="2" fill="#bdbdbd"/>
  <line x1="200" y1="120" x2="250" y2="90" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Wind energy (turbine on right) -->
  <rect x="310" y="180" width="12" height="50" fill="#795548"/>
  <circle cx="316" cy="175" r="3" fill="#424242"/>
  <!-- Blades -->
  <line x1="316" y1="175" x2="330" y2="175" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="316" y1="175" x2="302" y2="175" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="316" y1="175" x2="316" y2="160" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="316" y1="175" x2="316" y2="190" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Solar panels (bottom right) -->
  <rect x="290" y="230" width="20" height="3" fill="#ffc107" stroke="#f57f17" stroke-width="1"/>
  <rect x="310" y="235" width="20" height="3" fill="#ffc107" stroke="#f57f17" stroke-width="1"/>
  <rect x="330" y="230" width="20" height="3" fill="#ffc107" stroke="#f57f17" stroke-width="1"/>

  <!-- Decorative elements -->
  <circle cx="60" cy="80" r="4" fill="#66bb6a" opacity="0.5"/>
  <circle cx="350" cy="250" r="3" fill="#43a047" opacity="0.5"/>
  <circle cx="30" cy="280" r="2" fill="#7cb342" opacity="0.5"/>

  <!-- Text -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2e7d32" font-weight="bold">
    Tecnologia Sustentável
  </text>
</svg>
